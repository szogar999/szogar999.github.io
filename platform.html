<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSG Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:#0f1923;color:white;-webkit-tap-highlight-color:transparent;}
::-webkit-scrollbar{width:0;height:0;}
input,textarea,button{font-family:'Barlow',sans-serif;}
.bc{font-family:'Barlow Condensed',sans-serif;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;
const N="#0f1923",NM="#162130",NL="#1e2f42",OR="#e8601c",GR="#22c55e",BL="#3b82f6",YL="#f59e0b",GY="#8a9ab0",BD="rgba(255,255,255,0.07)";

const Btn=({children,onClick,variant="primary",style={}})=>{
  const v={primary:{background:OR,color:"white"},ghost:{background:"transparent",color:"white",border:`1px solid ${BD}`}};
  return <button onClick={onClick} style={{width:"100%",padding:14,border:"none",borderRadius:12,fontSize:15,fontWeight:700,cursor:"pointer",transition:"opacity .15s",...v[variant],...style}}>{children}</button>;
};

const Card=({children,style={},onClick,hl})=>(
  <div onClick={onClick} style={{background:NM,border:`1px solid ${hl||BD}`,borderRadius:14,overflow:"hidden",cursor:onClick?"pointer":"default",...style}}>
    {children}
  </div>
);

const Header=({title,onBack,right})=>(
  <div style={{background:N,padding:"14px 20px",display:"flex",alignItems:"center",gap:12,borderBottom:`1px solid ${BD}`,position:"sticky",top:0,zIndex:50}}>
    {onBack&&<button onClick={onBack} style={{width:36,height:36,background:NL,border:`1px solid ${BD}`,borderRadius:8,color:"white",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>←</button>}
    <span className="bc" style={{fontSize:22,fontWeight:800,flex:1}}>{title}</span>
    {right}
  </div>
);

const Nav=({active,go})=>(
  <div style={{position:"fixed",bottom:0,left:0,right:0,background:NM,borderTop:`1px solid ${BD}`,display:"flex",zIndex:100}}>
    {[["home","🏠","Start"],["compare","⚖️","Porównaj"],["rfq","📨","Zapytanie"],["supplier","🏪","Dostawca"]].map(([id,icon,label])=>(
      <button key={id} onClick={()=>go(id)} style={{flex:1,padding:"10px 4px",display:"flex",flexDirection:"column",alignItems:"center",gap:3,border:"none",background:"none",color:active===id?OR:GY,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".3px",cursor:"pointer"}}>
        <span style={{fontSize:20}}>{icon}</span>{label}
      </button>
    ))}
  </div>
);

function Home({go}){
  const [mode,setMode]=useState("client");
  const cats=[
    ["🧱","Materiały","842 prod.","compare"],["🔧","Narzędzia","391 prod.","compare"],
    ["🚜","Maszyny","47 dost.","compare"],["🚽","TOI TOI","24h","supplier"],
    ["🦺","BHP","318 prod.","compare"],["🏠","Kontenery","Algeco","supplier"],
    ["⚡","Elektryka","644 prod.","compare"],["💧","Hydraulika","512 prod.","compare"],
    ["🛏️","Noclegi","12 obiektów","supplier"]
  ];
  return(
    <div style={{paddingBottom:100}}>
      <div style={{background:N,padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:`1px solid ${BD}`,position:"sticky",top:0,zIndex:50}}>
        <div>
          <div className="bc" style={{fontWeight:800,fontSize:24}}>OSG<span style={{color:OR}}>.</span>Platform</div>
          <div style={{fontSize:10,color:GY,letterSpacing:1,textTransform:"uppercase"}}>Wszystko dla budowy</div>
        </div>
        <div style={{display:"flex",gap:12,alignItems:"center"}}>
          <div style={{width:36,height:36,background:NL,border:`1px solid ${BD}`,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,position:"relative"}}>
            🔔<div style={{position:"absolute",top:6,right:6,width:8,height:8,background:OR,borderRadius:"50%",border:`2px solid ${N}`}}/>
          </div>
          <div style={{width:36,height:36,background:OR,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:14}}>KM</div>
        </div>
      </div>

      <div style={{padding:"12px 20px",background:NM,borderBottom:`1px solid ${BD}`}}>
        <div style={{background:NL,borderRadius:10,padding:4,display:"flex",gap:4}}>
          {[["client","🏗️ Jestem na budowie"],["supplier","🏪 Jestem dostawcą"]].map(([m,label])=>(
            <button key={m} onClick={()=>{setMode(m);if(m==="supplier")go("supplier");}} style={{flex:1,padding:9,border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer",background:mode===m?OR:"transparent",color:mode===m?"white":GY,transition:"all .2s"}}>{label}</button>
          ))}
        </div>
      </div>

      <div style={{background:NM,padding:"10px 20px",display:"flex",alignItems:"center",gap:8,fontSize:13,color:GY,borderBottom:`1px solid ${BD}`}}>
        📍 Budowa: <strong style={{color:"white"}}>ul. Prosta 12, Warszawa</strong>
        <span style={{color:OR,fontSize:12,marginLeft:"auto",cursor:"pointer"}}>Zmień →</span>
      </div>

      <div style={{padding:"16px 20px"}}>
        <div style={{display:"flex",background:NL,border:`1px solid ${BD}`,borderRadius:10,overflow:"hidden"}}>
          <input placeholder="Szukaj materiałów, maszyn, usług..." style={{flex:1,background:"transparent",border:"none",outline:"none",padding:"12px 16px",color:"white",fontSize:14}}/>
          <button onClick={()=>go("compare")} style={{background:OR,border:"none",padding:"12px 18px",color:"white",fontSize:18,cursor:"pointer"}}>🔍</button>
        </div>
      </div>

      <div onClick={()=>go("compare")} style={{margin:"0 20px 16px",background:"linear-gradient(135deg,#1a3a5c,#1e2f42)",border:`1px solid rgba(232,96,28,0.4)`,borderRadius:14,padding:"16px 20px",cursor:"pointer",display:"flex",alignItems:"center",gap:14}}>
        <span style={{fontSize:32}}>⚖️</span>
        <div>
          <div style={{fontSize:15,fontWeight:700,marginBottom:3}}>Porównaj oferty dostawców</div>
          <div style={{fontSize:12,color:GY}}>Wpisz produkt → najtańszy i najszybszy</div>
        </div>
        <span style={{marginLeft:"auto",color:OR,fontSize:20}}>→</span>
      </div>

      <div className="bc" style={{padding:"0 20px 12px",fontSize:20,fontWeight:700}}>Czego potrzebujesz? <span style={{color:OR}}>→</span></div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,padding:"0 20px 24px"}}>
        {cats.map(([icon,name,count,sc])=>(
          <div key={name} onClick={()=>go(sc)} style={{background:NM,border:`1px solid ${BD}`,borderRadius:12,padding:"16px 12px",textAlign:"center",cursor:"pointer"}}>
            <div style={{fontSize:28,marginBottom:8}}>{icon}</div>
            <div style={{fontSize:11,fontWeight:600}}>{name}</div>
            <div style={{fontSize:10,color:GY,marginTop:3}}>{count}</div>
          </div>
        ))}
      </div>

      <div onClick={()=>go("order")} style={{margin:"0 20px 16px",background:"linear-gradient(135deg,#162130,#1e2f42)",border:`1px solid rgba(232,96,28,0.3)`,borderRadius:14,padding:20,cursor:"pointer",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",right:20,top:"50%",transform:"translateY(-50%)",fontSize:48,opacity:.15}}>⚡</div>
        <div style={{display:"inline-block",background:OR,color:"white",fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:4,textTransform:"uppercase",marginBottom:8}}>⚡ Ekspres</div>
        <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>Dostawa w 1–3 godziny</div>
        <div style={{fontSize:12,color:GY}}>Zamów teraz — Warszawa i Mazowsze</div>
      </div>

      <div onClick={()=>go("monetization")} style={{margin:"0 20px 24px",background:"linear-gradient(135deg,#1a2a1a,#1a3a2a)",border:`1px solid rgba(34,197,94,0.4)`,borderRadius:14,padding:"16px 20px",cursor:"pointer",display:"flex",alignItems:"center",gap:14}}>
        <span style={{fontSize:32}}>💰</span>
        <div>
          <div style={{fontSize:15,fontWeight:700,marginBottom:3}}>Jak OSG Platform zarabia?</div>
          <div style={{fontSize:12,color:GY}}>4 strumienie · model dla inwestora →</div>
        </div>
        <span style={{marginLeft:"auto",color:GR,fontSize:20}}>→</span>
      </div>

      <Nav active="home" go={go}/>
    </div>
  );
}

function Compare({go}){
  const offers=[
    {name:"Baumit Partner",sub:"★ 4.8 · Autoryzowany",price:"37,90",del:"Jutro rano",terms:"min. paleta",tag:"🏆 NAJTANIEJ",tc:GR,border:`2px solid ${GR}`},
    {name:"OSG Logistics",sub:"★ 4.9 · Ekspres",price:"39,50",del:"1–3h teraz",terms:"brak min.",tag:"⚡ NAJSZYBCIEJ",tc:OR,border:`2px solid ${OR}`},
    {name:"Adamex",sub:"★ 4.3 · Grodzisk",price:"38,90",del:"Dziś 14:00",terms:"min. 500 zł",tag:null,border:`1px solid ${BD}`},
    {name:"3W Budowlana",sub:"★ 4.6 · Sieć",price:"40,20",del:"Jutro rano",terms:"min. paleta",tag:null,border:`1px solid ${BD}`},
    {name:"Knauf Polska",sub:"★ 4.7 · Producent",price:"41,00",del:"2–3 dni",terms:"min. paleta",tag:null,border:`1px solid ${BD}`},
    {name:"Onninen",sub:"★ 4.5",price:"42,50",del:"Jutro rano",terms:"min. 300 zł",tag:null,border:`1px solid ${BD}`,dim:true},
    {name:"Abud",sub:"★ 4.4",price:"43,10",del:"2–3 dni",terms:"min. 500 zł",tag:null,border:`1px solid ${BD}`,dim:true},
  ];
  return(
    <div style={{paddingBottom:80}}>
      <Header title="Porównaj oferty" onBack={()=>go("home")}/>
      <div style={{padding:"12px 20px",background:NM,borderBottom:`1px solid ${BD}`}}>
        <div style={{background:NL,border:`1px solid ${OR}`,borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:18}}>🧱</span>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:700}}>Baumit StarContact 25kg</div>
            <div style={{fontSize:11,color:GY}}>12 dostawców odpytanych</div>
          </div>
          <span onClick={()=>go("rfq")} style={{color:OR,fontSize:12,fontWeight:700,cursor:"pointer"}}>Zmień →</span>
        </div>
      </div>
      <div style={{padding:"10px 20px 8px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontSize:12,color:GY}}>8 ofert otrzymanych</div>
        <div style={{display:"flex",gap:6}}>
          {["Cena ↑","Czas","Ocena"].map((l,i)=>(
            <div key={l} style={{padding:"4px 12px",background:i===0?OR:NL,border:i===0?"none":`1px solid ${BD}`,borderRadius:12,fontSize:11,fontWeight:700,color:i===0?"white":GY,cursor:"pointer"}}>{l}</div>
          ))}
        </div>
      </div>
      <div style={{padding:"0 20px 4px",display:"grid",gridTemplateColumns:"1fr 80px 90px 80px",gap:4}}>
        {["Dostawca","Cena","Dostawa","Warunki"].map(h=>(
          <div key={h} style={{fontSize:10,color:GY,fontWeight:700,textTransform:"uppercase",textAlign:h==="Dostawca"?"left":"center"}}>{h}</div>
        ))}
      </div>
      <div style={{padding:"0 20px 16px",display:"flex",flexDirection:"column",gap:8}}>
        {offers.map((o,i)=>(
          <div key={i} onClick={()=>go("order")} style={{background:NM,border:o.border,borderRadius:14,overflow:"hidden",cursor:"pointer",opacity:o.dim?.55:1}}>
            {o.tag&&<div style={{background:o.tc===GR?"rgba(34,197,94,.1)":"rgba(232,96,28,.1)",padding:"5px 14px"}}><span style={{fontSize:11,fontWeight:700,color:o.tc}}>{o.tag}</span></div>}
            <div style={{display:"grid",gridTemplateColumns:"1fr 80px 90px 80px",gap:4,alignItems:"center",padding:14}}>
              <div><div style={{fontSize:14,fontWeight:700}}>{o.name}</div><div style={{fontSize:10,color:GY}}>{o.sub}</div></div>
              <div style={{textAlign:"right"}}><div className="bc" style={{fontSize:20,fontWeight:800,color:o.tc||"white"}}>{o.price}zł</div><div style={{fontSize:9,color:GY}}>netto/worek</div></div>
              <div style={{textAlign:"center",fontSize:11,fontWeight:600,color:o.tc===OR?OR:"white"}}>{o.del}</div>
              <div style={{textAlign:"center",fontSize:10,color:GY}}>{o.terms}</div>
            </div>
          </div>
        ))}
        <div style={{fontSize:11,color:GY,textAlign:"center",padding:"4px 0"}}>+ 4 kolejne oferty oczekują</div>
        <Btn onClick={()=>go("order")}>✅ Zamów najlepszą ofertę — OSG 1–3h</Btn>
        <Btn onClick={()=>go("rfq")} variant="ghost" style={{marginTop:6}}>📨 Wyślij nowe zapytanie do 12 dostawców</Btn>
      </div>
      <Nav active="compare" go={go}/>
    </div>
  );
}

function RFQ({go}){
  const [sent,setSent]=useState(false);
  return(
    <div style={{paddingBottom:80}}>
      <Header title="Zapytanie ofertowe" onBack={()=>go("home")}/>
      <div style={{padding:"16px 20px",display:"flex",flexDirection:"column",gap:16}}>
        <Card><div style={{padding:16}}>
          <div style={{fontSize:11,color:GY,fontWeight:700,textTransform:"uppercase",letterSpacing:".8px",marginBottom:10}}>✍️ Opisz czego potrzebujesz</div>
          <textarea defaultValue="Potrzebuję: styropian grafit 20 cm, 300 m², dostawa Warszawa Bemowo, jutro rano." style={{width:"100%",background:NL,border:`1px solid ${BD}`,borderRadius:8,padding:12,color:"white",fontSize:13,lineHeight:1.6,resize:"none",outline:"none",minHeight:90}}/>
        </div></Card>
        <Card><div style={{padding:16,borderBottom:`1px solid ${BD}`}}>
          <div style={{fontSize:11,color:GY,fontWeight:700,textTransform:"uppercase",letterSpacing:".8px",marginBottom:12}}>📍 Szczegóły</div>
          {[["Adres budowy","ul. Prosta 12, Warszawa"],["Termin","Jutro rano"],["Budżet","do 15 000 zł"]].map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><span style={{fontSize:13,color:GY}}>{k}</span><span style={{fontSize:13,fontWeight:600,color:k==="Termin"?OR:"white"}}>{v}</span></div>
          ))}
        </div><div style={{padding:16}}>
          <div style={{fontSize:11,color:GY,fontWeight:700,textTransform:"uppercase",letterSpacing:".8px",marginBottom:10}}>📤 Wyślij do (12 dostawców)</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {["OSG Logistics","Baumit","3W","Adamex","Knauf","Onninen","+ 6 więcej"].map(n=>(
              <span key={n} style={{background:n==="OSG Logistics"?"rgba(232,96,28,.15)":NL,color:n==="OSG Logistics"?OR:GY,padding:"4px 10px",borderRadius:8,fontSize:11,fontWeight:n==="OSG Logistics"?700:400}}>{n}</span>
            ))}
          </div>
        </div></Card>
        {!sent&&<Btn onClick={()=>setSent(true)}>📨 Wyślij zapytanie do 12 dostawców</Btn>}
        {sent&&<>
          <div style={{background:"rgba(34,197,94,.08)",border:`1px solid rgba(34,197,94,.3)`,borderRadius:14,padding:16,textAlign:"center"}}>
            <div style={{fontSize:24,marginBottom:6}}>✅</div>
            <div style={{fontSize:15,fontWeight:700,marginBottom:3}}>Wysłano do 12 dostawców</div>
            <div style={{fontSize:12,color:GY}}>Odpowiedzi zazwyczaj w 15–30 min</div>
          </div>
          <Card><div style={{padding:"12px 16px",borderBottom:`1px solid ${BD}`,display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:12,fontWeight:700,color:GY}}>STATUS</span>
            <span style={{fontSize:12,color:GR,fontWeight:700}}>4 / 12 odpowiedzi</span>
          </div><div style={{padding:"14px 16px",display:"flex",flexDirection:"column",gap:12}}>
            {[{n:"OSG Logistics",t:"2 min temu",p:"8 940 zł",e:"⚡ jutro 7:00",c:OR},{n:"Baumit Partner",t:"5 min temu",p:"8 200 zł",e:"pojutrze rano",c:GR},{n:"3W Budowlana",t:"8 min temu",p:"8 750 zł",e:"jutro rano",c:"white"},{n:"Adamex + 8 innych",t:"Oczekiwanie...",p:"⏳",e:"",c:GY,dim:true}].map((r,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",opacity:r.dim?.5:1}}>
                <div><div style={{fontSize:13,fontWeight:600}}>{r.n}</div><div style={{fontSize:10,color:GY}}>{r.t}</div></div>
                <div style={{textAlign:"right"}}><div className="bc" style={{fontSize:18,fontWeight:800,color:r.c}}>{r.p}</div><div style={{fontSize:10,color:GY}}>{r.e}</div></div>
              </div>
            ))}
          </div></Card>
          <Btn onClick={()=>go("compare")}>⚖️ Porównaj oferty i wybierz</Btn>
        </>}
      </div>
      <Nav active="rfq" go={go}/>
    </div>
  );
}

function Supplier({go}){
  return(
    <div style={{paddingBottom:80}}>
      <Header title="Panel Dostawcy" right={<div style={{marginLeft:"auto",background:"rgba(34,197,94,.15)",color:GR,fontSize:11,fontWeight:700,padding:"4px 10px",borderRadius:8}}>● ONLINE</div>}/>
      <div style={{padding:"16px 20px",display:"flex",flexDirection:"column",gap:16}}>
        <Card><div style={{padding:16,display:"flex",gap:14,alignItems:"center"}}>
          <div style={{width:52,height:52,background:NL,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>🏪</div>
          <div>
            <div style={{fontSize:16,fontWeight:700}}>3W Budowlana</div>
            <div style={{fontSize:12,color:GY}}>Sieć hurtowni materiałów budowlanych</div>
            <div style={{fontSize:11,color:GR,marginTop:3}}>★ 4.6 · Partner OSG Platform</div>
          </div>
        </div></Card>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {[["7","Nowe zapytania",OR],["23","Wygranych",GR],["94%","Terminowość","white"]].map(([n,l,c])=>(
            <div key={l} style={{background:NM,border:`1px solid ${BD}`,borderRadius:10,padding:12,textAlign:"center"}}>
              <div className="bc" style={{fontSize:26,fontWeight:800,color:c}}>{n}</div>
              <div style={{fontSize:10,color:GY,marginTop:2}}>{l}</div>
            </div>
          ))}
        </div>
        <div className="bc" style={{fontSize:20,fontWeight:700}}>Nowe zapytania <span style={{color:OR}}>z budów</span></div>
        <Card hl={`1px solid rgba(232,96,28,.4)`}>
          <div style={{background:"rgba(232,96,28,.08)",padding:"6px 14px",display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:11,fontWeight:700,color:OR}}>🔥 PILNE · 45 min na odpowiedź</span>
            <span style={{fontSize:10,color:GY}}>2 min temu</span>
          </div>
          <div style={{padding:14}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>Styropian grafit 20cm · 300 m²</div>
            <div style={{fontSize:12,color:GY,marginBottom:10}}>📍 Warszawa Bemowo · jutro rano · do 15 000 zł</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>go("bid")} style={{flex:1,padding:10,background:OR,color:"white",border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer"}}>💰 Złóż ofertę</button>
              <button style={{padding:"10px 14px",background:NL,color:GY,border:`1px solid ${BD}`,borderRadius:8,cursor:"pointer"}}>Odrzuć</button>
            </div>
          </div>
        </Card>
        {[["Baumit StarContact 25kg · 20 worków","Warszawa Mokotów · dziś"],["Klej do płytek Weber · 50 worków","Piaseczno · pojutrze"]].map(([title,loc])=>(
          <Card key={title}><div style={{padding:14}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>{title}</div>
            <div style={{fontSize:12,color:GY,marginBottom:10}}>📍 {loc}</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>go("bid")} style={{flex:1,padding:10,background:OR,color:"white",border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer"}}>💰 Złóż ofertę</button>
              <button style={{padding:"10px 14px",background:NL,color:GY,border:`1px solid ${BD}`,borderRadius:8,cursor:"pointer"}}>Odrzuć</button>
            </div>
          </div></Card>
        ))}
        <div className="bc" style={{fontSize:20,fontWeight:700}}>Historia <span style={{color:GR}}>wygranych</span></div>
        <Card>
          {[["Gładź Baumit x30","Wola · 19 cze","1 840 zł"],["Styropian EPS · 50m²","Ursynów · 18 cze","3 200 zł"],["Cement x10 palet","Grodzisk · 17 cze","4 500 zł"]].map(([t,l,p],i,arr)=>(
            <div key={t} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",borderBottom:i<arr.length-1?`1px solid ${BD}`:"none"}}>
              <div><div style={{fontSize:13,fontWeight:600}}>{t}</div><div style={{fontSize:10,color:GY}}>{l}</div></div>
              <div className="bc" style={{fontSize:18,fontWeight:800,color:GR}}>{p}</div>
            </div>
          ))}
        </Card>
      </div>
      <Nav active="supplier" go={go}/>
    </div>
  );
}

function Bid({go}){
  const [sent,setSent]=useState(false);
  return(
    <div style={{paddingBottom:80}}>
      <Header title="Złóż ofertę" onBack={()=>go("supplier")}/>
      <div style={{padding:"16px 20px",display:"flex",flexDirection:"column",gap:16}}>
        <div style={{background:"rgba(232,96,28,.08)",border:`1px solid rgba(232,96,28,.3)`,borderRadius:14,padding:14}}>

function AIChat({open,onClose}){
  const [msgs,setMsgs]=useState([{role:"bot",text:"Cześć! Jestem asystentem OSG Platform. Powiedz mi czego potrzebujesz na budowę — pomogę dobrać materiały i znaleźć najlepszą ofertę. 🏗️"}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const SYS="Jesteś asystentem AI platformy OSG Platform — marketplace materiałów budowlanych w Warszawie i Mazowszu. Pomagasz kierownikom budów dobrać materiały, oszacować ilości i znaleźć najlepszą ofertę. Odpowiadaj po polsku, krótko i konkretnie jak ekspert budowlany.";
  const send=async(text)=>{
    if(!text.trim()||loading)return;
    const um={role:"user",text};
    setMsgs(m=>[...m,um]);setInput("");setLoading(true);
    try{
      const history=[...msgs,um].map(m=>({role:m.role==="user"?"user":"assistant",content:m.text}));
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:SYS,messages:history})});
      const data=await res.json();
      setMsgs(m=>[...m,{role:"bot",text:data.content?.[0]?.text||"Przepraszam, spróbuj ponownie."}]);
    }catch{setMsgs(m=>[...m,{role:"bot",text:"Błąd połączenia."}]);}
    setLoading(false);
  };
  if(!open)return null;
  return(
    <div style={{position:"fixed",inset:0,zIndex:300,background:N,display:"flex",flexDirection:"column"}}>
      <div style={{background:NM,padding:"14px 16px",display:"flex",alignItems:"center",gap:12,borderBottom:`1px solid ${BD}`,flexShrink:0}}>
        <div style={{width:40,height:40,background:`linear-gradient(135deg,${OR},#ff8c42)`,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🤖</div>
        <div><div style={{fontSize:15,fontWeight:700}}>OSG Asystent AI</div><div style={{fontSize:11,color:GR}}>● Online · Ekspert budowlany</div></div>
        <button onClick={onClose} style={{marginLeft:"auto",width:32,height:32,background:NL,border:"none",borderRadius:8,color:"white",fontSize:16,cursor:"pointer"}}>✕</button>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:12}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",gap:8,alignItems:"flex-end",maxWidth:"85%",alignSelf:m.role==="user"?"flex-end":"flex-start",flexDirection:m.role==="user"?"row-reverse":"row"}}>
            <div style={{width:28,height:28,borderRadius:"50%",background:m.role==="user"?NL:`linear-gradient(135deg,${OR},#ff8c42)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0,border:m.role==="user"?`1px solid ${BD}`:"none"}}>{m.role==="user"?"👷":"🤖"}</div>
            <div style={{padding:"10px 14px",borderRadius:14,fontSize:13,lineHeight:1.5,background:m.role==="user"?OR:NM,border:m.role==="user"?"none":`1px solid ${BD}`,borderBottomLeftRadius:m.role==="bot"?4:14,borderBottomRightRadius:m.role==="user"?4:14}}>{m.text}</div>
          </div>
        ))}
        {loading&&<div style={{display:"flex",gap:8,alignSelf:"flex-start"}}>
          <div style={{width:28,height:28,borderRadius:"50%",background:`linear-gradient(135deg,${OR},#ff8c42)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>🤖</div>
          <div style={{padding:"12px 16px",background:NM,border:`1px solid ${BD}`,borderRadius:14,display:"flex",gap:4}}>
            {[0,1,2].map(i=><div key={i} style={{width:6,height:6,background:GY,borderRadius:"50%"}}/>)}
          </div>
        </div>}
      </div>
      <div style={{padding:"8px 16px",display:"flex",gap:8,overflowX:"auto",flexShrink:0}}>
        {["Ile Baumitu na 200m²?","Co do wylewki?","Wykończenie łazienki 8m²","Porównaj styropian"].map(s=>(
          <div key={s} onClick={()=>send(s)} style={{flexShrink:0,padding:"7px 12px",background:NM,border:`1px solid ${BD}`,borderRadius:20,fontSize:12,color:GY,cursor:"pointer",whiteSpace:"nowrap"}}>{s}</div>
        ))}
      </div>
      <div style={{padding:"12px 16px",background:NM,borderTop:`1px solid ${BD}`,display:"flex",gap:10,alignItems:"center",flexShrink:0}}>
        <textarea value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send(input);}}} placeholder="Napisz czego potrzebujesz..." style={{flex:1,background:NL,border:`1px solid ${BD}`,borderRadius:10,padding:"10px 14px",color:"white",fontSize:13,resize:"none",outline:"none"}} rows={1}/>
        <button onClick={()=>send(input)} disabled={loading} style={{width:40,height:40,background:loading?NL:OR,border:"none",borderRadius:10,color:"white",fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>➤</button>
      </div>
    </div>
  );
}

function App(){
  const [screen,setScreen]=useState("home");

  const go=(s)=>{setScreen(s);window.scrollTo(0,0);};
  const map={home:<Home go={go}/>,compare:<Compare go={go}/>,rfq:<RFQ go={go}/>,supplier:<Supplier go={go}/>,bid:<Bid go={go}/>,monetization:<Monetization go={go}/>,order:<Order go={go}/>,confirm:<Confirm go={go}/>,category:<Compare go={go}/>};
  return(
    <div>
      {map[screen]||map.home}
      {!aiOpen&&(
        <button onClick={()=>setAiOpen(true)} style={{position:"fixed",bottom:76,right:16,width:52,height:52,background:`linear-gradient(135deg,${OR},#ff8c42)`,borderRadius:"50%",border:"none",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,cursor:"pointer",zIndex:200,boxShadow:`0 4px 20px rgba(232,96,28,.5)`}}>
          🤖
          <div style={{position:"absolute",top:-2,right:-2,width:16,height:16,background:GR,borderRadius:"50%",border:`2px solid ${N}`,fontSize:8,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700}}>AI</div>
        </button>
      )}
      <AIChat open={aiOpen} onClose={()=>setAiOpen(false)}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
